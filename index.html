<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10141f" />
    <title>Web Soccer Local Prototype</title>
    <link rel="stylesheet" href="assets/app.bcd3e7b2.css" />
  </head>
  <body>
    <div id="startPanel" class="start-panel" role="dialog" aria-modal="true" aria-labelledby="startTitle">
      <div class="start-card">
        <p class="eyebrow">启动设置</p>
        <h1 id="startTitle">热血足球联盟 WASM</h1>
        <p class="start-desc">只新增前置页面和音频开关；比赛输入/规则仍按原版逻辑移植。</p>

        <fieldset class="setting-group" data-setting="playMode">
          <legend>模式</legend>
          <div class="segmented" role="radiogroup" aria-label="模式">
            <button type="button" class="seg active" data-value="auto" aria-pressed="true">全自动</button>
            <button type="button" class="seg" data-value="semi" aria-pressed="false">半自动</button>
            <button type="button" class="seg" data-value="manual" aria-pressed="false">手动</button>
          </div>
        </fieldset>

        <fieldset class="setting-group" data-setting="drumMode">
          <legend>鼓机</legend>
          <div class="segmented" role="radiogroup" aria-label="鼓机">
            <button type="button" class="seg active" data-value="auto" aria-pressed="true">自动开启</button>
            <button type="button" class="seg" data-value="on" aria-pressed="false">开</button>
            <button type="button" class="seg" data-value="off" aria-pressed="false">关</button>
          </div>
        </fieldset>

        <label class="switch-row">
          <span>
            <b>引导模式</b>
            <small>打开：歌词前播放主旋律；歌词开始后只留伴奏。</small>
          </span>
          <input id="guideMode" type="checkbox" checked />
        </label>

        <button id="startGame" class="start-button" type="button">进入游戏</button>
        <p id="settingSummary" class="setting-summary">模式：全自动 / 鼓机：自动开启 / 引导：开</p>
      </div>
    </div>
    <div id="app">
      <div class="game-wrap">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="touchControls" aria-label="手机触控操作区">
          <div id="stick" class="stick" aria-label="移动摇杆">
            <div id="knob" class="knob"></div>
          </div>
          <div class="buttons">
            <button id="btnSprint" class="touch-btn secondary" type="button">冲刺</button>
            <button id="btnKick" class="touch-btn primary" type="button">踢球</button>
          </div>
        </div>
      </div>
      <div class="hud">
        <div id="modeStatus" class="mode-status"></div>
        <div><b>本地单机原型</b>：新架构，不依赖 NES。</div>
        <div>PC：方向键/WASD 移动，J/Z 踢球，K/X 冲刺，R 重置。</div>
        <div>手机：左侧摇杆移动，右侧按钮踢球/冲刺。</div>
        <div id="stats"></div>
      </div>
    </div>
    <script type="module" src="assets/app.be4f9d06.js"></script>
  </body>
</html>
