<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10141f" />
    <title>Web Soccer Local Prototype</title>
    <link rel="stylesheet" href="assets/app.5b0aa7cc.css" />
  </head>
  <body>
    <div id="app">
      <div class="game-wrap">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="touchControls" aria-label="手机触控操作区">
          <div id="stick" class="stick" aria-label="移动摇杆">
            <div id="knob" class="knob"></div>
          </div>
          <div class="buttons">
            <button id="btnStart" class="touch-btn start" type="button">START</button>
            <button id="btnSprint" class="touch-btn secondary" type="button">冲刺</button>
            <button id="btnKick" class="touch-btn primary" type="button">踢球</button>
          </div>
        </div>
      </div>
      <div class="hud">
        <div><b>本地单机原型</b>：新架构，不依赖 NES。</div>
        <div>PC：方向键/WASD 移动，J/Z 踢球(A)，K/X 冲刺(B)，Enter＝START，R 重置。</div>
        <div>手机：左侧摇杆移动，右侧按钮踢球(A)/冲刺(B)，START 键开始/退出демо。</div>
        <div id="stats"></div>
      </div>
    </div>
    <script type="module" src="assets/app.a11f2599.js"></script>
  </body>
</html>
