<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#10141f" />
    <meta name="soccer-release-version" content="20260724.29" />
    <title>热血足球联盟 · WASM 高保真移植</title>
    <link rel="stylesheet" href="assets/app.e6a4cdc4.css" />
  </head>
  <body>
    <div id="app">
      <div id="touchControls" class="game-deck controller-panel controller-dock" data-surface="outside-game" role="group" aria-label="游戏与手机触控操作区">
        <div id="leftControls" class="left-controls" aria-label="左侧方向控制区">
          <div id="stick" class="stick" aria-label="移动摇杆">
            <div id="knob" class="knob"></div>
          </div>
        </div>
        <div class="game-wrap" data-surface="game" aria-label="游戏画面">
          <canvas id="game" width="960" height="540"></canvas>
        </div>
        <div class="buttons" aria-label="右侧操作按钮区">
          <button id="btnSelect" class="touch-btn start" type="button">SELECT</button>
          <button id="btnStart" class="touch-btn start" type="button">START</button>
          <button id="btnSprint" class="touch-btn secondary" type="button">B</button>
          <button id="btnKick" class="touch-btn primary" type="button">A</button>
        </div>
      </div>
      <footer class="release-meta" aria-label="制作信息">
        <span>白河愁制作</span>
        <a href="http://www.ff18.com" rel="external">http://www.ff18.com</a>
        <span>版本 <span id="releaseVersion">20260724.29</span></span>
      </footer>
      <div id="stats" hidden></div>
    </div>
    <script type="module" src="assets/app.0633b1cd.js"></script>
  </body>
</html>
