<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10141f" />
    <title>Web Soccer Local Prototype</title>
    <link rel="stylesheet" href="assets/app.5b0aa7cc.css" />
  </head>
  <body>
    <div id="app">
      <div class="game-wrap">
        <canvas id="game" width="960" height="540"></canvas>
        <div id="touchControls" aria-label="手机触控操作区">
          <div id="stick" class="stick" aria-label="移动摇杆">
            <div id="knob" class="knob"></div>
          </div>
          <div class="buttons">
            <button id="btnStart" class="touch-btn start" type="button">START</button>
            <button id="btnSprint" class="touch-btn secondary" type="button">B</button>
            <button id="btnKick" class="touch-btn primary" type="button">A</button>
          </div>
        </div>
      </div>
      <div class="hud">
        <div><b>热血足球联盟 WASM 移植</b></div>
        <div>PC：方向键/WASD，J/Z＝A，K/X＝B，A+B＝跳，Enter＝START，R＝重置。</div>
        <div>手机：左侧方向，右侧原版 A/B；持球与无球时动作按原版上下文自动切换。</div>
        <div id="stats"></div>
      </div>
    </div>
    <script type="module" src="assets/app.f43be322.js"></script>
  </body>
</html>
